name: Update Web Flasher Firmware

on:
  repository_dispatch:
    types: [firmware-released]

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          gh release download "$TAG" --repo SpoolSense/spoolsense_scanner --pattern '*.bin' --pattern '*.csv' --dir docs/firmware/ --clobber

      - name: Update manifest versions
        run: |
          VERSION="${{ github.event.client_payload.tag }}"
          VERSION="${VERSION#v}"
          for m in docs/installation/manifest*.json; do
            sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" "$m"
          done

      - name: Commit and push
        id: commit
        run: |
          VERSION="${{ github.event.client_payload.tag }}"
          VERSION="${VERSION#v}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/firmware/ docs/installation/manifest*.json
          if git commit -m "firmware: update web flasher to v${VERSION}"; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            git push
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to push"
          fi

      # Pushes made with the default GITHUB_TOKEN don't trigger other workflows
      # (anti-recursion guard), so deploy.yml's `on: push` won't fire from the
      # manifest commit above. Trigger it explicitly so the new firmware version
      # actually goes live on the site.
      - name: Trigger site redeploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --repo "${{ github.repository }}" --ref main

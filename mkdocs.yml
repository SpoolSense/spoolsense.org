site_name: SpoolSense
site_url: https://spoolsense.org
site_description: Smart filament tracking for your 3D printer
site_author: SpoolSense

theme:
  name: material
  palette:
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SpoolSense
    - icon: fontawesome/brands/discord
      link: https://discord.gg/pbXJhKpzd2

copyright: Copyright &copy; 2026 SpoolSense — Licensed under GPL-3.0

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

